<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing – TERA AI Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

        .step-indicator {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        h2 {
            color: #333;
            font-size: 1.8em;
        }

        .animation-box {
            margin: 40px 0;
        }

        .video-icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 20px;
            margin: 30px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 20px;
            transition: width 0.3s;
        }

        .status-text {
            font-size: 1.2em;
            color: #333;
            margin: 20px 0;
        }

        .timer {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .message {
            color: #666;
            margin: 30px 0;
            padding: 20px;
            background: #f8faff;
            border-radius: 12px;
        }

        .cancel-btn {
            background: white;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            background: #ff6b6b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="step-indicator">2</div>
            <h2>AI is Working...</h2>
        </div>

        <div class="animation-box">
            <div class="video-icon">🎬</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="status">Starting...</div>
            <div class="timer" id="timer">~30 seconds</div>
        </div>

        <div class="message">
            ⚡ AI आपके video को edit कर रहा है<br>
            कृपया इस window को खुला रखें
        </div>

        <button class="cancel-btn" onclick="if(confirm('Cancel editing?')) window.location.href='upload.html'">
            Cancel
        </button>
    </div>

    <script>
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        
        const statuses = [
            'Analyzing video...',
            'Adding AI effects...',
            'Enhancing audio...',
            'Almost done...'
        ];

        // Simulate progress
        const interval = setInterval(() => {
            progress += Math.random() * 5;
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = 'result.html';
                }, 1000);
            }
            
            progressBar.style.width = progress + '%';
            
            // Update status message
            const statusIndex = Math.floor((progress / 100) * statuses.length);
            statusEl.textContent = statuses[Math.min(statusIndex, statuses.length - 1)];
            
            // Update timer
            const secondsLeft = Math.max(0, Math.ceil((100 - progress) / 3));
            timerEl.textContent = `~${secondsLeft} seconds left`;
            
        }, 300);

        // 실제 API 연동 시 사용할 코드 (지금은 시뮬레이션)
        /*
        async function checkStatus() {
            const response = await fetch('/api/v1/videos/projects/{id}/status');
            const data = await response.json();
            progressBar.style.width = data.progress + '%';
            if (data.status === 'completed') {
                window.location.href = 'result.html';
            }
        }
        setInterval(checkStatus, 2000);
        */
    </script>
</body>
</html>
