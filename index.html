<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERA AI Editor – India ka sabse simple AI video editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .cta-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            color: #666;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            display: block;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            color: #888;
        }

        .step {
            flex: 1;
            text-align: center;
        }

        .step-icon {
            font-size: 2em;
            margin-bottom: 10px;
            display: block;
        }

        .trust-badge {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ TERA AI EDITOR</h1>
        <p class="subtitle">India ka sabse simple AI video editor<br>बस 3 कदम में अपना video ready!</p>
        
        <button class="cta-btn" onclick="window.location.href='upload.html'">
            🚀 Get Started – It's Free
        </button>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number">50K+</span>
                <span>Creators</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">4.9★</span>
                <span>Rating</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">10M+</span>
                <span>Edits</span>
            </div>
        </div>

        <div class="steps">
            <div class="step">
                <span class="step-icon">📤</span>
                <span>Upload</span>
            </div>
            <div class="step">
                <span class="step-icon">⚡</span>
                <span>AI Edit</span>
            </div>
            <div class="step">
                <span class="step-icon">📥</span>
                <span>Download</span>
            </div>
        </div>

        <div class="trust-badge">
            ⭐ No credit card required • 100% safe • Made in India
        </div>
    </div>
</body>
</html>
