<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Video is Ready – TERA AI Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .step-indicator {
            background: #10b981;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        h2 {
            color: #333;
            font-size: 1.8em;
        }

        .success-badge {
            background: #10b981;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .video-preview {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin: 30px 0;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2em;
            border: 2px solid #667eea;
        }

        .preview-placeholder {
            background: #1a1a2e;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .preview-placeholder i {
            font-size: 4em;
            color: #667eea;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #eee;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .share-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .share-title {
            color: #666;
            margin-bottom: 15px;
        }

        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .share-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .share-btn:hover {
            transform: scale(1.1);
        }

        .twitter { background: #1DA1F2; }
        .whatsapp { background: #25D366; }
        .facebook { background: #4267B2; }

        .rating {
            text-align: center;
            margin-top: 20px;
            color: #fbbf24;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="step-indicator">✓</div>
            <h2>Your Video is Ready!</h2>
        </div>

        <div class="success-badge">✨ AI Edit Complete</div>

        <div class="video-preview">
            <div class="preview-placeholder">
                <i>🎬</i>
                <span>Click to play preview</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="downloadVideo()">
                📥 Download Video
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='upload.html'">
                🔄 Edit Another
            </button>
        </div>

        <div class="share-section">
            <div class="share-title">Share your creation</div>
            <div class="share-buttons">
                <button class="share-btn twitter" onclick="share('twitter')">𝕏</button>
                <button class="share-btn whatsapp" onclick="share('whatsapp')">📱</button>
                <button class="share-btn facebook" onclick="share('facebook')">f</button>
            </div>
        </div>

        <div class="rating">
            ⭐⭐⭐⭐⭐ • 50,000+ happy creators
        </div>
    </div>

    <script>
        function downloadVideo() {
            // Show downloading message
            alert('✅ Download started! Your video is being saved.');
            
            // 실제 다운로드 URL로 대체
            // window.location.href = '/api/v1/videos/projects/{id}/download';
        }

        function share(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent('Check out my AI-edited video! Made with TERA AI Editor 🎬');
            
            let shareUrl = '';
            
            if (platform === 'twitter') {
                shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
            } else if (platform === 'whatsapp') {
                shareUrl = `https://wa.me/?text=${text}%20${url}`;
            } else if (platform === 'facebook') {
                shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            }
            
            window.open(shareUrl, '_blank');
        }
    </script>
</body>
</html>
