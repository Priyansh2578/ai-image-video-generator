<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - TERA AI</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 { margin: 0 0 10px; color: #666; }
        .card p { font-size: 24px; font-weight: bold; color: #667eea; margin: 0; }
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .action-btn {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .logout {
            background: #dc3545;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>✨ TERA AI Editor</h2>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="stats">
        <div class="card">
            <h3>Videos Left</h3>
            <p id="videosLeft">-</p>
        </div>
        <div class="card">
            <h3>Images Left</h3>
            <p id="imagesLeft">-</p>
        </div>
        <div class="card">
            <h3>Plan</h3>
            <p id="userPlan">-</p>
        </div>
    </div>

    <div class="actions">
        <a href="upload-video.html" class="action-btn">🎬 Upload Video</a>
        <a href="upload-image.html" class="action-btn">🖼️ Upload Image</a>
    </div>

    <script>
    async function loadDashboard() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
            return;
        }
        
        try {
            const response = await fetch('http://localhost:8000/api/v1/users/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            const user = await response.json();
            
            document.getElementById('videosLeft').textContent = user.credits_remaining || '3';
            document.getElementById('imagesLeft').textContent = '30';
            document.getElementById('userPlan').textContent = user.plan_type || 'Free';
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
    
    loadDashboard();
    </script>
</body>
</html>
