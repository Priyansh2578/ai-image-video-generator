version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tera_postgres
    environment:
      POSTGRES_USER: tera_user
      POSTGRES_PASSWORD: tera_pass
      POSTGRES_DB: tera_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tera_network

  redis:
    image: redis:7-alpine
    container_name: tera_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tera_network

networks:
  tera_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
